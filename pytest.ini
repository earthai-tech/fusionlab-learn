[pytest]
markers =
    require_skbio: skip tests if skbio is not installed.
minversion = 6.0
testpaths =
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore:.*Node\.traverse\(\) is obsoleted by Node\.findall\(\).*:PendingDeprecationWarning
