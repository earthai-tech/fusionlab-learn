<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- MapLibre -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <!-- Qt WebChannel (QWebEngine) -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <!-- Engine CSS -->
    <link rel="stylesheet" href="./style.css" />

    <!-- Common contract + helpers (MUST load early) -->
    <script src="../common/api_contract.js"></script>
    <script src="../common/bridge_qt.js"></script>
    <script src="../common/colormap.js"></script>
    <script src="../common/utils.js"></script>

    <!-- MapLibre layers (extracted modules) -->
    <script src="./layers/basemap.js"></script>
    <script src="./layers/points.js"></script>
    <script src="./layers/hexbin.js"></script>
    <script src="./layers/contours.js"></script>
    <script src="./layers/hotspots.js"></script>
    <script src="./layers/vectors.js"></script>
  </head>

  <body>
    <div id="map"></div>

    <!-- Optional visible error overlay -->
    <div id="gp-fail" class="gp-fail" style="display:none;">
      <div class="gp-fail__title">Map failed</div>
      <div id="gp-fail-msg" class="gp-fail__msg"></div>
    </div>

    <!-- Engine main -->
    <script src="./main.js"></script>
  </body>
</html>
